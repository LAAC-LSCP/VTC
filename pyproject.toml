[project]
name = "vtc"
version = "2.1.0"
description = "The inference code for the Voice Type Classifier model"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pyannote-audio>=3.4.0",
    "segma",
    "tqdm>=4.67.1",
]

[tool.uv.sources]
segma = { git = "https://github.com/arxaqapi/segma", rev = "977225f2e0400465cd6a0c525f11c963223c8830" }

[dependency-groups]
doc = [
    "zensical>=0.0.37",
]

[project.urls]
documentation = "https://docs.cognitive-ml.fr/fastabx"
