[project]
name = "vtc"
version = "2.1.0"
description = "The inference code for the Voice Type Classifier model"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pyannote-audio>=3.4.0",
    "segma",
    "tqdm>=4.67.1",
]

[tool.uv.sources]
segma = { git = "https://github.com/MarvinLvn/segma", rev = "dad876e2268799ff12671a865167126eef66c34c" }

[dependency-groups]
doc = [
    "zensical>=0.0.37",
]

[project.urls]
documentation = "https://docs.cognitive-ml.fr/fastabx"
